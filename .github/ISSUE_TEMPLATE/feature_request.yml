---
name: "Feature request"
description: "Suggest a new feature or improvement."
title: "[FEATURE] <short description>"
labels: [enhancement]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Please describe the feature or improvement you would like to see.
  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "A concise description of the feature."
      placeholder: "Add dark mode support."
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: "Motivation"
      description: "Why is this feature important to you?"
      placeholder: "It will improve accessibility for users who prefer dark mode."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution"
      description: "Describe your proposed solution."
      placeholder: "Use Bootstrap's dark theme classes and add a toggle button."
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "Have you considered any alternative solutions?"
      placeholder: "Allow users to set a custom theme."
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: "Additional context"
      description: "Add any other context or screenshots."
      placeholder: "Related issues, screenshots, or references."
    validations:
      required: false
