---
name: "Bug report"
description: "Report a bug to help us improve."
title: "[BUG] <short description>"
labels: [bug]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Please fill out the following information to help us reproduce and fix the issue.
  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "A concise description of the bug."
      placeholder: "The logout button does not work on mobile."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "List the steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: "What did you expect to happen?"
      placeholder: "The logout button should log the user out and redirect to the login page."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      description: "What actually happened?"
      placeholder: "Nothing happens when the logout button is clicked."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Please provide information about your environment."
      placeholder: |
        - OS: [e.g. Windows 11, macOS 14]
        - Browser: [e.g. Chrome 120, Safari 17]
        - Device: [e.g. Desktop, iPhone 15]
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: "Additional context"
      description: "Add any other context about the problem here."
      placeholder: "Screenshots, logs, or error messages."
    validations:
      required: false
