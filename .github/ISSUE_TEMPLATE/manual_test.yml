---
name: "Manual Test"
description: "Document a manual test procedure for the project."
title: "[MANUAL TEST] <short description>"
labels: [manual test]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Manual Test
        Please use the format below to describe your manual test procedure.
  - type: input
    id: test_title
    attributes:
      label: "Test Title"
      description: "A concise title for the manual test."
      placeholder: "Room booking process manual test"
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: "Objective"
      description: "What is the goal of this manual test?"
      placeholder: "Verify that a guest can book a room successfully."
    validations:
      required: true
  - type: textarea
    id: preconditions
    attributes:
      label: "Preconditions"
      description: "List any preconditions that must be met before executing the test."
      placeholder: |
        - User is logged in
        - Room is available
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: "Test Steps"
      description: "List the steps to execute the manual test."
      placeholder: |
        1. Navigate to the booking page
        2. Select a room and dates
        3. Complete the booking form
        4. Submit the booking
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Result"
      description: "Describe the expected outcome of the test."
      placeholder: "Booking confirmation is displayed and email is sent."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual Result"
      description: "Describe the actual outcome after executing the test."
      placeholder: "Confirmation page is not displayed."
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: "Additional Notes"
      description: "Add any other context, attachments, or references."
      placeholder: "Screenshots, logs, or related issues."
    validations:
      required: false
